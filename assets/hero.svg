<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-label="Identidade visual em azul e dourado">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071b24"/>
      <stop offset="1" stop-color="#05141b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2d08a"/>
      <stop offset="1" stop-color="#d4b36d"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="20%" r="70%">
      <stop offset="0" stop-color="#f2d08a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f2d08a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="960" height="720" fill="url(#bg)"/>
  <circle cx="140" cy="90" r="240" fill="url(#glow)"/>
  <circle cx="860" cy="640" r="260" fill="url(#glow)" opacity="0.55"/>

  <g filter="url(#shadow)" opacity="0.92">
    <rect x="120" y="120" width="720" height="480" rx="34" fill="#0b2430" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>

  <g transform="translate(480 248)">
    <g transform="translate(-90 -90)">
      <rect x="0" y="0" width="180" height="180" rx="22" fill="none" stroke="url(#gold)" stroke-width="10"/>
      <rect x="26" y="26" width="128" height="128" rx="18" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.65"/>
      <path d="M52 98l26 26 56-72" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M168 22l-34 34" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
      <path d="M168 54l-64 64" stroke="url(#gold)" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    </g>
  </g>

  <g font-family="Playfair Display, serif" text-anchor="middle" fill="#f4f7fb">
    <text x="480" y="430" font-size="64" letter-spacing="6">PRIME</text>
    <text x="480" y="500" font-size="64" letter-spacing="6">HIDRÁULICA</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle" fill="#f4f7fb" opacity="0.85">
    <text x="480" y="552" font-size="18" letter-spacing="2">COMÉRCIO E MANUTENÇÃO DE</text>
    <text x="480" y="578" font-size="18" letter-spacing="2">EQUIPAMENTOS HIDRÁULICOS LTDA</text>
  </g>

  <g opacity="0.7">
    <path d="M140 610c110-56 210-56 320 0" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
    <path d="M500 610c110-56 210-56 320 0" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
